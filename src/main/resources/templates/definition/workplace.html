<html layout:decorate="~{layout_page}" xmlns:layout="http://www.w3.org/1999/xhtml">
<th:block layout:fragment="content">
  <style>
    input[type="text"],
    input[type="tel"],
    input[type="date"],
    input[type="number"],
    input[type="email"],
    select {
      width: 280px;
    }
  </style>
  <div class="layout-contents">
    <div class="page-title-wrap">
      <div class="left">
        <h2>사업장 정보</h2>
        <a title="북마크" class="bookmark toggle">내 메뉴</a>
      </div>
      <ul class="page-navi">
        <li><img th:src="@{/images/icon/ico-nav-home.svg}" alt="홈아이콘"></li>
        <li>기준정보</li>
        <li>사업장 정보</li>
      </ul>
    </div>

    <section class="section">
      <div class="container-fluid">

        <!-- 어드민 전용: 사업장 자동완성 검색 -->
        <div id="adminSelectWrap" style="display:none; margin-bottom: 20px; position: relative;">
          <label style="font-weight: bold; margin-right: 8px;">사업장</label>
          <input type="text" id="adminSearchInput" placeholder="코드 또는 사업장명 입력"
                 style="width: 300px;" autocomplete="off" oninput="onAdminSearch()" onblur="hideDropdown()">
          <ul id="adminDropdown" style="
              display: none; position: absolute; left: 76px; top: 100%;
              width: 300px; max-height: 220px; overflow-y: auto;
              background: #fff; border: 1px solid #ccc; border-radius: 4px;
              list-style: none; margin: 0; padding: 0; z-index: 999; box-shadow: 0 2px 8px rgba(0,0,0,0.15);
          "></ul>
        </div>

        <div class="section-top">
          <div class="title-wrap"></div>
          <div class="button-wrap" style="justify-content: end">
            <ul>
              <li>
                <a class="btn btn-edit" id="btnSave" title="저장" onclick="save()">
                  <img th:src="@{/images/icon/ico-save.svg}" alt="저장 아이콘">
                  저장
                </a>
              </li>
            </ul>
          </div>
        </div>

        <div class="table-wrap">
          <table class="write-table">
            <caption>사업장 테이블</caption>
            <tbody>
            <tr th:if="${userinfo.superUser != null and userinfo.superUser or userinfo.username == 'admin'}">
              <th>사업장코드</th>
              <td colspan="4"><input type="text" id="spjangcd2" name="spjangcd2" readonly style="background:#f5f5f5;"></td>
              <th>사업장명</th>
              <td colspan="4"><input type="text" id="spjangnm" name="spjangnm"></td>
            </tr>
            <tr th:unless="${userinfo.superUser != null and userinfo.superUser or userinfo.username == 'admin'}">
              <input type="hidden" id="spjangcd2" name="spjangcd2">
              <th>사업장명</th>
              <td colspan="9"><input type="text" id="spjangnm" name="spjangnm"></td>
            </tr>
            <tr>
              <th colspan="10" style="text-align: center; height: 30px; padding: 5px 10px;">기본정보</th>
            </tr>
            <tr>
              <th>사업형태</th>
              <td colspan="4">
                <label><input type="radio" class="custperclsf" name="custperclsf" value="8" checked> 법인</label>
                <label><input type="radio" class="custperclsf" name="custperclsf" value="1"> 개인</label>
              </td>
              <th>사업자등록번호</th>
              <td colspan="4">
                <input type="text" id="saupnum" name="saupnum" class="biz-number">
              </td>
            </tr>
            <tr>
              <th>대표자</th>
              <td colspan="4"><input type="text" id="prenm" name="prenm"></td>
              <th>법인/주민등록번호</th>
              <td colspan="4"><input type="text" id="compnum" name="compnum" class="biz-number"></td>
            </tr>
            <tr>
              <th>업태</th>
              <td colspan="4"><input type="text" id="biztype" name="biztype"></td>
              <th>업종</th>
              <td colspan="4"><input type="text" id="item" name="item"></td>
            </tr>
            <tr>
              <th>개업일자</th>
              <td colspan="4"><input type="date" id="openymd" name="openymd"></td>
              <th>폐업일자</th>
              <td colspan="4"><input type="date" id="eddate" name="eddate"></td>
            </tr>
            <tr>
              <th>전화번호</th>
              <td colspan="4"><input type="tel" id="tel1" class="phone-format" name="tel1"></td>
              <th>팩스번호</th>
              <td colspan="4"><input type="tel" id="fax" class="phone-format" name="fax"></td>
            </tr>
            <tr>
              <th>사업장소재지</th>
              <td colspan="9">
                <input type="text" id="zipcd" name="zipcd" placeholder="우편번호" onclick="setZipCode('zipcd')" style="width: 200px;">
                <input type="text" id="adresa" name="adresa">
                <input type="text" id="adresb" name="adresb" placeholder="상세주소">
              </td>
            </tr>
            <tr>
              <th colspan="10" style="text-align: center; height: 30px; padding: 5px 10px;">CMS 서비스 정보</th>
            </tr>
            <tr>
              <th>CMS이용기관코드</th>
              <td colspan="4">
                <input type="text" id="cmsCode" name="cmsCode" maxlength="10" placeholder="10자리">
              </td>
              <th>CMS비밀번호</th>
              <td colspan="4">
                <input type="text" id="cmsPw" name="cmsPw" maxlength="20">
              </td>
            </tr>
            <tr>
              <th>통장기재내용</th>
              <td colspan="4">
                <input type="text" id="cmsMemo" name="cmsMemo" maxlength="50" placeholder="출금 시 납부자 통장 표시 문구">
              </td>
              <th>CMS서비스상태</th>
              <td colspan="4">
                <select id="cmsState" name="cmsState">
                  <option value="">선택</option>
                  <option value="apply">신청</option>
                  <option value="approve">승인</option>
                  <option value="stop">해지</option>
                </select>
              </td>
            </tr>
            <tr>
              <th>입금은행</th>
              <td colspan="4">
                <input type="text" id="cmsBankCode" name="cmsBankCode" maxlength="3" placeholder="은행코드 3자리" style="width: 140px;">
              </td>
              <th>입금계좌번호</th>
              <td colspan="4">
                <input type="text" id="cmsBankAcct" name="cmsBankAcct" maxlength="20" placeholder="하이픈(-) 제외">
              </td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>
  </div>

  <footer style="margin-top:5px;">
    <p>Copyrightⓒ 0000 corp. All rights reserved.</p>
  </footer>
  <div style="height: 10px"></div>
</th:block>

<th:block layout:fragment="scripts">
  <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
  <script th:src="@{/js/InputFormat.js}"></script>
  <script type="text/javascript">
    attachTelFormatterAll('.phone-format');
    attachBizNumberFormatterAll('.biz-number');

    var isAdmin = [[${userinfo.superUser != null and userinfo.superUser or userinfo.username == 'admin'}]];
    var allSpjangData = [];

    document.readyState === 'complete' ? init() : window.onload = init;

    function init() {
      if (isAdmin) {
        loadAdminData();
      } else {
        loadMyData();
      }
    }

    // 어드민: 전체 사업장 미리 로드
    function loadAdminData() {
      $.ajax({
        url: withCtx('/api/workplace/read'),
        type: 'GET',
        success: function (res) {
          allSpjangData = res.data || [];
          document.getElementById('adminSelectWrap').style.display = 'block';
          if (allSpjangData.length > 0) {
            var first = allSpjangData[0];
            document.getElementById('adminSearchInput').value = first.spjangcd + ' - ' + (first.spjangnm || '');
            bindForm(first);
          }
        }
      });
    }

    // 검색 입력 시 드롭다운 표시
    function onAdminSearch() {
      var keyword = document.getElementById('adminSearchInput').value.trim().toLowerCase();
      var ul = document.getElementById('adminDropdown');
      ul.innerHTML = '';

      if (!keyword) { ul.style.display = 'none'; return; }

      var filtered = allSpjangData.filter(function (d) {
        return (d.spjangcd || '').toLowerCase().includes(keyword)
            || (d.spjangnm || '').toLowerCase().includes(keyword);
      });

      if (filtered.length === 0) { ul.style.display = 'none'; return; }

      filtered.forEach(function (item) {
        var li = document.createElement('li');
        li.style.cssText = 'padding: 8px 12px; cursor: pointer; border-bottom: 1px solid #f0f0f0;';
        li.innerHTML = '<span style="font-weight:bold; color:#333;">' + item.spjangcd + '</span>'
            + ' <span style="color:#666;">' + (item.spjangnm || '') + '</span>'
            + (item.prenm ? ' <span style="color:#999; font-size:12px;">(' + item.prenm + ')</span>' : '');
        li.addEventListener('mousedown', function () {
          document.getElementById('adminSearchInput').value = item.spjangcd + ' - ' + (item.spjangnm || '');
          ul.style.display = 'none';
          bindForm(item);
        });
        li.addEventListener('mouseover', function () { this.style.background = '#f5f7ff'; });
        li.addEventListener('mouseout',  function () { this.style.background = ''; });
        ul.appendChild(li);
      });

      ul.style.display = 'block';
    }

    function hideDropdown() {
      setTimeout(function () {
        document.getElementById('adminDropdown').style.display = 'none';
      }, 150);
    }

    // 일반 사용자: 내 사업장 데이터 로드
    function loadMyData() {
      $.ajax({
        url: withCtx('/api/workplace/my'),
        type: 'GET',
        success: function (res) {
          if (res.data) bindForm(res.data);
        }
      });
    }

    function bindForm(item) {
      document.getElementById('spjangcd2').value = item.spjangcd || '';
      document.getElementById('spjangnm').value = item.spjangnm || '';
      var radio = document.querySelector('input[name="custperclsf"][value="' + item.custperclsf + '"]');
      if (radio) radio.checked = true;
      document.getElementById('saupnum').value = item.saupnum || '';
      document.getElementById('prenm').value = item.prenm || '';
      document.getElementById('compnum').value = item.compnum || '';
      document.getElementById('biztype').value = item.biztype || '';
      document.getElementById('item').value = item.item || '';
      document.getElementById('openymd').value = formatDateToInput(item.openymd);
      document.getElementById('eddate').value = formatDateToInput(item.eddate);
      document.getElementById('tel1').value = item.tel1 || '';
      document.getElementById('fax').value = item.fax || '';
      document.getElementById('zipcd').value = item.zipcd || '';
      document.getElementById('adresa').value = item.adresa || '';
      document.getElementById('adresb').value = item.adresb || '';
      document.getElementById('cmsCode').value = item.cmsCode || '';
      document.getElementById('cmsPw').value = item.cmsPw || '';
      document.getElementById('cmsMemo').value = item.cmsMemo || '';
      document.getElementById('cmsBankCode').value = item.cmsBankCode || '';
      document.getElementById('cmsBankAcct').value = item.cmsBankAcct || '';
      document.getElementById('cmsState').value = item.cmsState || '';
    }

    function setZipCode(zipid) {
      new daum.Postcode({
        oncomplete: function (data) {
          document.getElementById(zipid).value = data.zonecode;
          document.getElementById(zipid === 'zipcd' ? 'adresa' : 'adres2a').value = data.roadAddress;
        }
      }).open();
    }

    function save() {
      Alert.confirm('', '저장하시겠습니까?', function () {
        var formData = new FormData();
        formData.append('spjangcd', $('#spjangcd2').val());
        formData.append('spjangnm', $('#spjangnm').val());
        formData.append('custperclsf', $('.custperclsf:checked').val());
        formData.append('saupnum', $('#saupnum').val());
        formData.append('prenm', $('#prenm').val());
        formData.append('compnum', $('#compnum').val());
        formData.append('biztype', $('#biztype').val());
        formData.append('item', $('#item').val());
        formData.append('openymd', formatDateToYYYYMMDD($('#openymd').val()));
        formData.append('eddate', formatDateToYYYYMMDD($('#eddate').val()));
        formData.append('tel1', $('#tel1').val());
        formData.append('fax', $('#fax').val());
        formData.append('zipcd', $('#zipcd').val());
        formData.append('adresa', $('#adresa').val());
        formData.append('adresb', $('#adresb').val());
        formData.append('cmsCode', $('#cmsCode').val());
        formData.append('cmsPw', $('#cmsPw').val());
        formData.append('cmsMemo', $('#cmsMemo').val());
        formData.append('cmsBankCode', $('#cmsBankCode').val());
        formData.append('cmsBankAcct', $('#cmsBankAcct').val());
        formData.append('cmsState', $('#cmsState').val());

        $.ajax({
          url: withCtx('/api/workplace/save'),
          type: 'POST',
          data: formData,
          processData: false,
          contentType: false,
          headers: { 'X-CSRF-Token': $('[name=_csrf]').val() },
          success: function (res) {
            if (res.success) {
              Alert.alert('', res.message);
            } else {
              Alert.alert('', '저장에 실패했습니다.');
            }
          },
          error: function () {
            Alert.alert('', '에러가 발생하였습니다.');
          }
        });
      });
    }

    function formatDateToYYYYMMDD(dateString) {
      if (!dateString) return '';
      return dateString.replace(/-/g, '');
    }

    function formatDateToInput(dateStr) {
      if (!dateStr || dateStr.length !== 8) return '';
      return dateStr.substring(0, 4) + '-' + dateStr.substring(4, 6) + '-' + dateStr.substring(6, 8);
    }
  </script>
</th:block>
</html>
