<html layout:decorate="~{layout_page}" xmlns:layout="http://www.w3.org/1999/xhtml">
<head>
    <style>
        .wj-header { text-align: center !important; }
        .status-badge { display: inline-block; padding: 2px 8px; border-radius: 10px;
            font-size: 11px; font-weight: 600; }
        .status-PENDING   { background: #fff3cd; color: #856404; }
        .status-REQUESTED { background: #cce5ff; color: #004085; }
        .status-SUCCESS   { background: #d4edda; color: #155724; }
        .status-FAIL      { background: #f8d7da; color: #721c24; }
        .status-CANCEL    { background: #e2e3e5; color: #383d41; }
        .summary-cards {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }
        .summary-card {
            flex: 1;
            background: #fff;
            border: 1px solid #dde0ea;
            border-radius: 8px;
            padding: 14px 18px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .summary-card .card-label {
            font-size: 11px;
            color: #888;
            font-weight: 600;
            text-transform: uppercase;
        }
        .summary-card .card-value {
            font-size: 20px;
            font-weight: 700;
            color: #222;
        }
        .summary-card .card-sub {
            font-size: 12px;
            color: #aaa;
        }
        .summary-card.success { border-top: 3px solid #28a745; }
        .summary-card.fail    { border-top: 3px solid #dc3545; }
        .summary-card.rate    { border-top: 3px solid #4a6cf7; }
        .grid-summary {
            display: flex;
            gap: 16px;
            padding: 6px 10px;
            background: #f5f6fa;
            border: 1px solid #dde0ea;
            border-top: none;
            font-size: 12px;
            color: #444;
        }
        .grid-summary span { font-weight: 700; color: #4a6cf7; }

        /* EB22 파일 목록 모달 스타일 */
        .modal-eb22 {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1051;
            align-items: center;
            justify-content: center;
        }
        .modal-eb22.show {
            display: flex;
        }
        .modal-eb22-content {
            background: #fff;
            border-radius: 8px;
            padding: 24px 28px;
            width: 500px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 24px rgba(0,0,0,0.2);
        }
        .modal-eb22-header {
            margin: 0 0 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #dde0ea;
            font-size: 15px;
            font-weight: 600;
            color: #222;
        }
        .modal-eb22-loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 200px;
            color: #999;
            font-size: 14px;
        }
        .modal-eb22-error {
            padding: 16px;
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            border-radius: 4px;
            color: #721c24;
            margin-bottom: 12px;
        }
        .modal-eb22-file-list {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 12px;
        }
        .modal-eb22-file-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border: 1px solid #dde0ea;
            border-radius: 4px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .modal-eb22-file-item:hover {
            background: #f5f6fa;
        }
        .modal-eb22-file-item.selected {
            background: #cce5ff;
            border-color: #004085;
        }
        .modal-eb22-file-item.processed {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .modal-eb22-file-checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .modal-eb22-file-info {
            flex: 1;
        }
        .modal-eb22-file-name {
            font-weight: 600;
            color: #222;
            margin-bottom: 4px;
        }
        .modal-eb22-file-meta {
            font-size: 12px;
            color: #888;
        }
        .modal-eb22-file-status {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
        }
        .modal-eb22-file-status.processed {
            background: #e2e3e5;
            color: #383d41;
        }
        .modal-eb22-file-status.pending {
            background: #fff3cd;
            color: #856404;
        }
        .modal-eb22-footer {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            padding-top: 12px;
            border-top: 1px solid #dde0ea;
        }
        .btn-modal {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-modal-cancel {
            background: #e2e3e5;
            color: #383d41;
        }
        .btn-modal-cancel:hover {
            background: #d4d5d8;
        }
        .btn-modal-process {
            background: #4a6cf7;
            color: #fff;
        }
        .btn-modal-process:hover:not(:disabled) {
            background: #3858d6;
        }
        .btn-modal-process:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>

            <div class="left">
                <h2>수납 결과 조회</h2>
                <a title="북마크" class="bookmark toggle">내 메뉴</a>
            </div>
            <ul class="page-navi">
                <li><img th:src="@{/images/icon/ico-nav-home.svg}" alt="홈아이콘"></li>

            </div>

            </div>
            <div class="summary-card rate">
                <div class="card-label">수납률</div>
                <div class="card-value" id="cardRate">0%</div>

        <section class="section">

                        <dd>

                                <input type="date" class="form-control2" id="srchResultDate" style="width:130px;">

            <div class="container-fluid">

    <!-- EB22 파일 목록 모달 -->
    <div id="modalEb22Files" class="modal-eb22">

                수신 가능한 EB22 결과 파일 목록

<th:block layout:fragment="scripts">
    <script type="text/javascript">
        var theGrid;
        var viewdata;
        let eb22SelectedFile = null;
        let eb22Files = [];

        var STATUS_MAP = {
            PENDING:   '대기',
            REQUESTED: '출금요청',
            SUCCESS:   '성공',
            FAIL:      '실패',
            CANCEL:    '취소'
        };

        var columns = [
            {
                binding: 'selected',
                header: '',
                width: 40,
                align: 'center',
                allowSorting: false,
                isReadOnly: false,
                dataType: 'Boolean'
            },
            {binding: 'billing_seq',  header: '청구번호',  width: 130, align: 'center'},
            {binding: 'member_name',  header: '납부자명',  width: 140, align: 'left'},
            {binding: 'bank_name',    header: '은행',      width: 80,  align: 'center'},
            {binding: 'bank_account', header: '계좌번호',  width: 150, align: 'center'},
            {binding: 'billing_amount', header: '청구금액', width: 110, align: 'right',
                cellTemplate: function(ctx) {
                    return ctx.value != null ? Number(ctx.value).toLocaleString() : '';
                }},
            {binding: 'fee_total', header: '수수료', width: 90, align: 'right',
                cellTemplate: function(ctx) {
                    return ctx.value != null ? Number(ctx.value).toLocaleString() : '';
                }},
            {binding: 'deduct_date',  header: '출금일자',  width: 100, align: 'center',
                cellTemplate: function(ctx) {
                    if (!ctx.value) return '-';
                    var v = String(ctx.value);
                    return v.length === 8
                        ? v.substring(0,4) + '-' + v.substring(4,6) + '-' + v.substring(6,8)
                        : v;
                }},
            {binding: 'status', header: '상태', width: 80, align: 'center',
                cellTemplate: function(ctx) {
                    var label = STATUS_MAP[ctx.value] || ctx.value || '';
                    return '<span class="status-badge status-' + ctx.value + '">' + label + '</span>';
                }},
            {binding: 'result_code',  header: '결과코드',  width: 90,  align: 'center'},
            {binding: 'result_msg',   header: '결과메시지', width: 200, align: 'left'},
            {binding: 'result_date',  header: '처리일자',  width: 100, align: 'center'},
            {binding: 'recharged_yn', header: '재청구', width: 80, align: 'center',
                cellTemplate: function(ctx) {
                    var item = ctx.row.dataItem;
                    if (ctx.value === 'Y' && item.status === 'FAIL') {
                        return '<span style="background:#e8f4fd; color:#4a90d9; padding:2px 7px; border-radius:8px; font-size:11px; font-weight:600;">재청구</span>';
                    }
                    return '';
                }},
        ];

        document.readyState === 'complete' ? init() : window.onload = init;

        function init() {
            var now = new Date();
            var ym = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
            $('#srchBillingYm').val(ym);
            searchList();
        }

        function searchList() {
            var ymVal = $('#srchBillingYm').val();
            if (!ymVal) { Alert.alert('', '청구년월을 선택하세요.'); return; }
            $.ajax({
                url: withCtx('/api/cms/billing/result/list'),
                type: 'GET',
                data: {
                    billing_ym:  ymVal.replace('-', ''),
                    result_date: ($('#srchResultDate').val() || '').replace(/-/g, ''),
                    status:      $('#srchStatus').val(),
                    member_name: $('#srchMemberName').val()
                },
                success: function(result) {
                    if (result.success) {
                        bindGrid(result.data || []);
                        updateSummary(result.data || []);
                    }
                }
            });
        }

        function bindGrid(data) {
            data.forEach(function(item) { item.selected = false; });

            if (theGrid) theGrid.dispose();
            viewdata = new wijmo.collections.CollectionView(data);
            theGrid = new wijmo.grid.FlexGrid('#theGrid', {
                autoGenerateColumns: false,
                showMarquee: true,
                columns: columns,
                isReadOnly: true,
                itemsSource: viewdata
            });
            theGrid.rowHeaders.columns.splice(0, 1);

            // 헤더 전체선택 체크박스 (FAIL 건만)
            theGrid.formatItem.addHandler(function(s, e) {
                var col = s.columns[e.col];

                // 헤더 전체선택 체크박스
                if (e.panel.cellType === wijmo.grid.CellType.ColumnHeader && col.binding === 'selected') {
                    e.cell.innerHTML = '<input type="checkbox" id="chkAll">';
                    var chkAll = e.cell.querySelector('#chkAll');
                    if (chkAll) {
                        chkAll.checked = viewdata.items.length > 0
                            && viewdata.items.every(function(r) { return r.selected; });
                        chkAll.onclick = function(ev) {
                            var checked = ev.target.checked;
                            viewdata.items.forEach(function(r) { r.selected = checked; });
                            theGrid.refresh();
                            updateCheckedSummary();
                        };
                    }
                }

                // 셀 체크박스 - 모든 행에 표시
                if (e.panel.cellType === wijmo.grid.CellType.Cell && col.binding === 'selected') {
                    var item = s.rows[e.row].dataItem;
                    e.cell.innerHTML = '<input type="checkbox" class="row-check"'
                        + (item && item.selected ? ' checked' : '') + '>';
                }
            });

            $('#theGrid').on('change', '.row-check', function() {
                var row = theGrid.hitTest(this).row;
                if (row >= 0) {
                    var item = viewdata.items[row];
                    if (item) item.selected = $(this).is(':checked');
                }
                updateCheckedSummary();
            });
        }

        function openRechargeModal() {
            var ymVal = $('#srchBillingYm').val();
            if (!ymVal) { Alert.alert('', '청구년월을 선택하세요.'); return; }

            var ym = ymVal.split('-');
            var lastDay = new Date(ym[0], ym[1], 0).getDate(); // 해당 월 말일
            var startStr = ymVal.replace('-', '') + '01';
            var endStr   = ymVal.replace('-', '') + String(lastDay).padStart(2, '0');

            $.ajax({
                url: withCtx('/api/cms/billing/history/list'),
                type: 'GET',
                data: { start_date: startStr, end_date: endStr, status: 'FAIL,ERROR', billing_type: 'EB' , recharge_filter: true},
                success: function(result) {
                    if (!result.success || !result.data || result.data.length === 0) {
                        Alert.alert('', '재청구할 실패 건이 없습니다.');
                        return;
                    }
                    renderRechargeModal(result.data);
                    $('#modalRecharge').css('display', 'flex');
                }
            });
        }

        function renderRechargeModal(rows) {
            // 다음 영업일 계산 후 디폴트 출금일 세팅
            var tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            var tomorrowStr = tomorrow.getFullYear() + '-'
                + String(tomorrow.getMonth() + 1).padStart(2, '0') + '-'
                + String(tomorrow.getDate()).padStart(2, '0');
            $('#rechargeAllDate').val(tomorrowStr);

            var html = '';
            rows.forEach(function(row) {
                var deductFmt = '';
                var v = String(row.deduct_date || '');
                if (v.length === 8) deductFmt = v.substring(0,4) + '-' + v.substring(4,6) + '-' + v.substring(6,8);
                html += '<tr>'
                    + '<td style="padding:7px 8px; border:1px solid #dde0ea; text-align:center;">'
                    +   '<input type="checkbox" class="recharge-check" checked data-id="' + row.id + '">'
                    + '</td>'
                    + '<td style="padding:7px 8px; border:1px solid #dde0ea;">' + (row.member_name || '') + '</td>'
                    + '<td style="padding:7px 8px; border:1px solid #dde0ea; text-align:right;">' + Number(row.billing_amount || 0).toLocaleString() + '원</td>'
                    + '<td style="padding:7px 8px; border:1px solid #dde0ea; text-align:center;">' + (row.result_msg || '-') + '</td>'
                    + '<td style="padding:7px 8px; border:1px solid #dde0ea; text-align:center;">' + deductFmt + '</td>'
                    + '<td style="padding:7px 8px; border:1px solid #dde0ea; text-align:center;">'
                    +   '<input type="date" class="recharge-date" style="border:1px solid #dde0ea; border-radius:3px; font-size:12px;" value="' + tomorrowStr + '">'
                    + '</td>'
                    + '</tr>';
            });
            $('#rechargeRows').html(html);

            // 전체선택 체크박스
            $('#rechargeChkAll').off('change').on('change', function() {
                $('.recharge-check').prop('checked', $(this).is(':checked'));
            });
        }

        function doRecharge() {
            var items = [];
            $('#rechargeRows tr').each(function() {
                var chk  = $(this).find('.recharge-check');
                var date = $(this).find('.recharge-date').val();
                if (chk.is(':checked') && date) {
                    items.push({ id: chk.data('id'), deduct_date: date.replace(/-/g, '') });
                }
            });
            if (items.length === 0) { Alert.alert('', '재청구할 건을 선택하세요.'); return; }

            Alert.confirm('', items.length + '건을 재청구하시겠습니까?', function() {
                $('#modalRecharge').hide();
                // 건별로 순차 처리
                var ids = items.map(function(i) { return i.id; }).join(',');
                AjaxUtil.postAsyncData('/api/cms/billing/recharge',
                    { ids: ids },
                    function(result) {
                        if (result.success) {
                            Alert.alert('', (result.data ? result.data.count : 0) + '건 재청구 생성되었습니다.');
                            searchList();
                        } else {
                            Alert.alert('재청구 실패', result.message);
                        }
                    });
            });
        }

        function updateSummary(data) {
            var successItems = data.filter(function(i) { return i.status === 'SUCCESS'; });
            var failItems    = data.filter(function(i) { return i.status === 'FAIL'; });

            var successAmt = successItems.reduce(function(s, i) { return s + (Number(i.billing_amount) || 0); }, 0);
            var failAmt    = failItems.reduce(function(s, i)    { return s + (Number(i.billing_amount) || 0); }, 0);
            var totalAmt   = data.reduce(function(s, i)         { return s + (Number(i.billing_amount) || 0); }, 0);

            var rate = totalAmt > 0 ? (successAmt / totalAmt * 100).toFixed(1) : '0.0';

            $('#cardSuccessCount').text(successItems.length.toLocaleString() + '건');
            $('#cardSuccessAmt').text(successAmt.toLocaleString() + '원');
            $('#cardFailCount').text(failItems.length.toLocaleString() + '건');
            $('#cardFailAmt').text(failAmt.toLocaleString() + '원');
            $('#cardRate').text(rate + '%');
            $('#cardRateSub').text(successAmt.toLocaleString() + '원 / ' + totalAmt.toLocaleString() + '원');

            $('#summaryTotal').text(data.length.toLocaleString());
            $('#summaryTotalAmt').text(totalAmt.toLocaleString());
        }

        function updateCheckedSummary() {
            var checked = viewdata ? viewdata.items.filter(function(i) { return i.selected; }) : [];
            if (checked.length === 0) {
                $('#summaryChecked').hide();
            } else {
                var amt = checked.reduce(function(s, i) { return s + (Number(i.billing_amount) || 0); }, 0);
                $('#summaryCheckedCount').text(checked.length.toLocaleString());
                $('#summaryCheckedAmt').text(amt.toLocaleString());
                $('#summaryChecked').show();
            }
        }

        function openEb22FilesModal() {
            // 모달 열기
            $('#modalEb22Files').addClass('show');
            $('#modalEb22Error').hide();
            $('#modalEb22FileList').html('<div class="modal-eb22-loading"><span>파일 목록을 불러오는 중...</span></div>');
            $('#btnEb22Process').prop('disabled', true);
            eb22SelectedFile = null;

            // SFTP에서 사용 가능한 파일 목록 조회
            loadEb22Files();
        }

        function loadEb22Files() {

            $.ajax({
                url: withCtx('/api/cms/billing/available-files'),
                type: 'GET',
                data: { deduct_type: $('#srchDeductType').val() || 'EB' },
                success: function(response) {
                    if (response.success && response.data) {
                        eb22Files = response.data;
                        renderEb22FileList(eb22Files);
                    } else {
                        showEb22Error('파일 목록 조회 실패: ' + (response.message || '알 수 없는 오류'));
                    }
                },
                error: function(xhr) {
                    var msg = '파일 목록 조회 실패';
                    if (xhr.responseJSON && xhr.responseJSON.message) {
                        msg = xhr.responseJSON.message;
                    }
                    showEb22Error(msg);
                }
            });
        }

        function renderEb22FileList(files) {
            if (files.length === 0) {
                $('#modalEb22FileList').html(
                    '<div style="padding:20px; text-align:center; color:#888;">' +
                    '수신 가능한 파일이 없습니다.' +
                    '</div>'
                );
                return;
            }

            var html = '';
            files.forEach(function(file, idx) {
                var fileDate = file.yyyy + '-' + file.mmdd.substring(0, 2) + '-' + file.mmdd.substring(2, 4);
                var statusHtml = file.processed ?
                    '<div class="modal-eb22-file-status processed">처리완료</div>' :
                    '<div class="modal-eb22-file-status pending">대기</div>';

                html += '<div class="modal-eb22-file-item' + (file.processed ? ' processed' : '') + '" data-filename="' + file.fileName + '">' +
                    '<input type="radio" name="eb22File" class="modal-eb22-file-checkbox" value="' + file.fileName + '"'
                    + (file.processed ? ' disabled' : '') + '>' +
                    '<div class="modal-eb22-file-info">' +
                    '  <div class="modal-eb22-file-name">' + file.fileName + '</div>' +
                    '  <div class="modal-eb22-file-meta">' +
                    '    날짜: ' + fileDate +
                    '  </div>' +
                    '</div>' +
                    statusHtml +
                    '</div>';
            });

            $('#modalEb22FileList').html(html);

            // 라디오 버튼 이벤트
            $(document).off('change', 'input[name="eb22File"]').on('change', 'input[name="eb22File"]', function() {
                eb22SelectedFile = $(this).val();
                $('#btnEb22Process').prop('disabled', false);
                $('.modal-eb22-file-item').removeClass('selected');
                $(this).closest('.modal-eb22-file-item').addClass('selected');
            });

            // 클릭으로도 선택 가능
            $(document).off('click', '.modal-eb22-file-item').on('click', '.modal-eb22-file-item', function(e) {
                if ($(e.target).is('input[type="radio"]')) return;
                if ($(this).hasClass('processed')) return;  // ← 추가
                $(this).find('input[type="radio"]').click();
            });
        }

        function showEb22Error(msg) {
            $('#modalEb22Error').html(msg).show();
            $('#modalEb22FileList').html('');
        }

        function processSelectedEb22File() {
            if (!eb22SelectedFile) {
                Alert.alert('', '파일을 선택하세요.');
                return;
            }

            Alert.confirm('', eb22SelectedFile + ' 파일을 처리하시겠습니까?', function() {
                AjaxUtil.postAsyncData(
                    '/api/cms/billing/receive-file',
                    {
                        fileName: eb22SelectedFile,
                        deduct_type: $('#srchDeductType').val() || 'EB'
                    },
                    function(response) {
                        if (response.success) {
                            Alert.alert('', response.data.message || '처리가 완료되었습니다.');
                            $('#modalEb22Files').removeClass('show');
                            searchList();
                        } else {
                            Alert.alert('처리 실패', response.message);
                        }
                    }
                );
            });
        }

        $(document).ready(function() {
            $('#btnSearch').click(searchList);
            $('#srchMemberName').keypress(function(e) { if (e.which === 13) searchList(); });
            $('#btnResend').click(openRechargeModal);
            $('#btnRechargeConfirm').click(doRecharge);
            // $('#btnReceiveNow').click(function() {
            //     Alert.confirm('', '결과 파일을 지금 수신하시겠습니까?', function() {
            //         AjaxUtil.postAsyncData('/api/cms/billing/receive-now',
            //             { deduct_type: $('#srchDeductType').val() || 'EB' },
            //             function(result) {
            //                 if (result.success) {
            //                     Alert.alert('', '수신 완료');
            //                     searchList();
            //                 } else {
            //                     Alert.alert('수신 실패', result.message);
            //                 }
            //             });
            //     });
            // });
            // 결과 수신 버튼 클릭
            $('#btnReceiveNow').click(openEb22FilesModal);

            // 모달 닫기
            $('#btnEb22Cancel').click(function() {
                $('#modalEb22Files').removeClass('show');
            });
            // 모달 외부 클릭으로 닫기
            $('#modalEb22Files').click(function(e) {
                if ($(e.target).is('#modalEb22Files')) {
                    $('#modalEb22Files').removeClass('show');
                }
            });

            // 파일 처리 버튼
            $('#btnEb22Process').click(processSelectedEb22File);

        });
    </script>
</th:block>
