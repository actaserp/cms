ncp_api_accessKey=${ncp_api_accessKey}
ncp_api_secretKey=${ncp_api_secretKey}
ncp_api_cwKey=${ncp_api_cwKey}
ncp_api_instanceNo=${ncp_api_instanceNo}

# NCP Object Storage (S3 호환)
ncp.storage.endpoint=https://kr.object.ncloudstorage.com
ncp.storage.region=kr-standard
ncp.storage.bucket=actas-ai-files

# CMS 금결원 설정
# 기관코드 (10자리)
cms.institution-code=${CMS_INSTITUTION_CODE}
# 오픈API 기본URL (테스트: https://tapi.cmsedi.or.kr:1443 / 운영: https://api.cmsedi.or.kr)
cms.api-base-url=${CMS_API_BASE_URL:https://tapi.cmsedi.or.kr:1443}
cms.client-id=${CMS_CLIENT_ID:}
cms.client-secret=${CMS_CLIENT_SECRET:}
# SFTP 호스트 (테스트: tsftp.cmsedi.or.kr / 운영: sftp.cmsedi.or.kr), 포트: 11133
cms.sftp-host=${CMS_SFTP_HOST:tsftp.cmsedi.or.kr}
cms.sftp-port=${CMS_SFTP_PORT:11133}
