# actas
server.port=8040

# actas
server.servlet.session.cookie.name=cms_jsessionid

# actas
spring.datasource.hikari.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.jdbc-url=${cms_test_DB_URL}

spring.datasource.hikari.username=${cms_test_DB_USERNAME}
spring.datasource.hikari.password=${cms_test_DB_PASSWORD}
spring.datasource.hikari.maximum-pool-size = 5
spring.datasource.hikari.minimum-idle = 1
spring.datasource.hikari.maxLifetime = 1800000
spring.datasource.hikari.idle-timeout = 600000
spring.datasource.hikari.leak-detection-threshold=5000

